<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Алиас для единообразия путей (чтобы работало http://localhost/kursach/front/)
    Alias /kursach/front /var/www/html

    # Разрешаем .htaccess и следование символическим ссылкам
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Доступ к папке assets
    Alias /kursach/assets /var/www/assets
    Alias /assets /var/www/assets
    <Directory /var/www/assets>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Доступ к папке img
    Alias /kursach/img /var/www/img
    Alias /img /var/www/img
    <Directory /var/www/img>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
