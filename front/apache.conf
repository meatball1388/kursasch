<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Разрешаем .htaccess и следование символическим ссылкам
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Доступ к папке assets (лежит выше front/)
    Alias /assets /var/www/html/../assets
    <Directory /var/www/html/../assets>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Доступ к папке img
    Alias /img /var/www/html/../img
    <Directory /var/www/html/../img>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
