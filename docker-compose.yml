version: "3.9"

services:
  # ──────────────────────────────────────
  # PostgreSQL — база данных
  # ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kursach_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: creating_software
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/add_reviews.sql:/docker-entrypoint-initdb.d/02_reviews.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creating_software"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────
  # FastAPI бэкенд
  # ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kursach_backend
    restart: unless-stopped
    environment:
      DB_URL: postgresql://postgres:1234@db:5432/creating_software
      FRONTEND_URL: http://localhost/kursach
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────
  # PHP фронтенд (Apache + PHP 8.2)
  # ──────────────────────────────────────
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: kursach_frontend
    restart: unless-stopped
    volumes:
      - ./front:/var/www/html
      - ./assets:/var/www/assets
      - ./img:/var/www/img
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
